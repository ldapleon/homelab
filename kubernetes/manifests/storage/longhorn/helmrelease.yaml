apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  interval: 30m
  chart:
    spec:
      chart: longhorn
      version: "1.11.3"
      sourceRef:
        kind: HelmRepository
        name: longhorn
        namespace: longhorn-system
      interval: 30m
  values:
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2

    defaultSettings:
      defaultReplicaCount: 2
      defaultDataPath: /var/lib/longhorn

    ingress:
      enabled: false