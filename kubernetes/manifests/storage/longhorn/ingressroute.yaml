apiVersion: traefik.io/v1alpha1
kind: IngressRoute

metadata:
  name: longhorn
  namespace: longhorn-system

spec:
  entryPoints:
    - websecure

  routes:
    - match: Host(`longhorn.home.arpa`)
      kind: Rule

      services:
        - name: longhorn-frontend
          port: 80

  tls:
    secretName: homelab-root-ca-tls