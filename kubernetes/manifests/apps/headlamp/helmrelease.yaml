apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: headlamp
spec:
  interval: 30m
  chart:
    spec:
      chart: headlamp
      version: "0.43.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: headlamp
      interval: 30m
  values:
    replicaCount: 1

    service:
      type: ClusterIP
      port: 80

    config:
      inCluster: true