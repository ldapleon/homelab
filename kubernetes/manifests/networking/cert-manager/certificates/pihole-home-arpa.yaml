apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: pihole-home-arpa
  namespace: cert-manager

spec:
  secretName: pihole-home-arpa-tls

  issuerRef:
    name: homelab-ca-issuer
    kind: ClusterIssuer

  dnsNames:
    - pihole.home.arpa

  privateKey:
    algorithm: RSA
    size: 2048