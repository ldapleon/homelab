apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: hubble
  namespace: kube-system
spec:
  entryPoints:
    - websecure

  routes:
    - match: Host(`hubble.home.arpa`)
      kind: Rule
      services:
        - name: hubble-ui
          port: 80

  tls:
    secretName: hubble-home-arpa-tls