apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization

metadata:
  name: storage
  namespace: flux-system

spec:
  interval: 10m

  dependsOn:
    - name: networking

  sourceRef:
    kind: GitRepository
    name: flux-system

  path: ./kubernetes/manifests/storage

  prune: true
  wait: true